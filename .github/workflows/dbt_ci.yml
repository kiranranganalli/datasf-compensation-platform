name: dbt CI

on:
  pull_request:
    paths: ['dbt/**']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Install dbt
        run: pip install dbt-snowflake

      # Run dbt build + tests against an isolated CI schema
      - name: dbt build
        working-directory: dbt/datasf_compensation
        env:
          SNOWFLAKE_ACCOUNT:  ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:     ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          DBT_TARGET_SCHEMA:  "ci_pr_${{ github.event.pull_request.number }}"
        run: |
          dbt deps
          dbt build --target ci

      # Critical: run tests as each role to catch RBAC regressions
      - name: Role-aware visibility tests
        working-directory: dbt/datasf_compensation
        run: |
          dbt test --target ci_public_access
          dbt test --target ci_hr_analyst
          dbt test --target ci_auditor
